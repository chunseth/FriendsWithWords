<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Friends With Words</title>
    <style>
      :root {
        --bg: #f8f4ed;
        --card: #fffdf8;
        --text: #22313f;
        --muted: #5e6b66;
        --accent: #d97706;
        --border: #eadcc8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #fcf8f1 0%, var(--bg) 100%);
        color: var(--text);
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 20px 80px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 32px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 44px;
        line-height: 1;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.6;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      a.button {
        display: inline-block;
        padding: 14px 18px;
        border-radius: 14px;
        text-decoration: none;
        font-weight: 700;
        border: 1px solid var(--border);
        color: var(--text);
        background: #fff;
      }

      a.button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Friends With Words</h1>
        <p>
          Friends With Words is a word game built around shared seeded boards,
          daily challenges, personal stats, and leaderboard competition.
        </p>
        <p>
          Play the daily board, try a custom seed, and compete on equal letter
          draws for the best possible score.
        </p>
        <div class="links">
          <a class="button primary" href="./support.html">Support</a>
          <a class="button" href="./privacy.html">Privacy Policy</a>
          <a class="button" href="https://github.com/chunseth/FriendsWithWords"
            >GitHub</a
          >
        </div>
      </section>
    </main>
  </body>
</html>
